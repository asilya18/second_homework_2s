databaseChangeLog:
  - changeSet:
      id: create-sessions-table
      author: asilya18
      changes:
        - createTable:
            tableName: sessions
            columns:
              - column:
                  name: session_id
                  type: VARCHAR(255)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: expire_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
