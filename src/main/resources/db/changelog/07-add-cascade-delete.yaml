databaseChangeLog:
  - changeSet:
      id: add-cascade-to-rss-sources
      author: asilya18
      changes:
        - dropForeignKeyConstraint:
            baseTableName: rss_sources
            constraintName: fk_rss_sources_user_id

        - addForeignKeyConstraint:
            baseTableName: rss_sources
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_rss_sources_user_id
            onDelete: CASCADE

  - changeSet:
      id: add-cascade-to-posts
      author: asilya18
      changes:
        - dropForeignKeyConstraint:
            baseTableName: posts
            constraintName: fk_posts_source_id

        - addForeignKeyConstraint:
            baseTableName: posts
            baseColumnNames: source_id
            referencedTableName: rss_sources
            referencedColumnNames: id
            constraintName: fk_posts_source_id
            onDelete: CASCADE
